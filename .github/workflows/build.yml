name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Estrai il progetto
        run: unzip -o "DoveApp-android.zip"
      - name: Imposta Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Imposta Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Compila APK
        run: cd DoveApp && gradle assembleDebug --no-daemon
      - name: Carica APK come risultato
        uses: actions/upload-artifact@v4
        with:
          name: dove-app-apk
          path: DoveApp/app/build/outputs/apk/debug/app-debug.apk
